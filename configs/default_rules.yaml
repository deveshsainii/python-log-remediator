# Log Analysis Rules
log_source: "logs/"
prometheus_port: 8000

# NEW: Global notification settings
notifications:
  email:
    enabled: true
    recipient: "admin@example.com"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    cooldown_seconds: 60  # Only alert once per minute for the same rule

rules:
  - name: "Out of Memory Critical"
    pattern: "OutOfMemoryError"
    severity: "CRITICAL"
    remediation:
      action: "restart_service"
      target: "java-service"
      retries: 3

  - name: "Connection Timeout"
    pattern: "Connection refused"
    severity: "WARNING"
    remediation:
      action: "kill_process"
      target: "stale-worker"
      retries: 1

  - name: "Disk Space Warning"
    pattern: "Disk space low"
    severity: "CRITICAL"
    remediation:
      action: "clear_cache"
      target: "/tmp/app-cache"
      retries: 2
