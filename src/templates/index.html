<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Dashboard | Log Analysis & Remediation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-crimson: #ef4444;
            --accent-gold: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: #334155;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h1 { margin: 0; font-weight: 300; letter-spacing: -0.05em; font-size: 2.5rem; }
        .status-pill {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.875rem;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .stat-val { font-size: 2.5rem; font-weight: 700; margin: 0.5rem 0; color: var(--accent-gold); }
        .stat-label { color: var(--text-dim); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em; }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .event-feed {
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .event-item {
            padding: 0.75rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--border-color);
            font-size: 0.9rem;
        }

        .event-item.CRITICAL { border-left-color: var(--accent-crimson); }
        .event-item.WARNING { border-left-color: var(--accent-gold); }

        .chart-container {
            min-height: 300px;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>SRE <span style="color: var(--accent-crimson)">LOG</span> ANALYSIS</h1>
            <div style="color: var(--text-dim); margin-top: 0.5rem;">Auto-Remediation Monitor v1.0</div>
        </div>
        <div class="status-pill">● System Active</div>
    </header>

    <div class="stats-grid">
        <div class="card">
            <div class="stat-label">Logs Processed</div>
            <div id="processed-count" class="stat-val">0</div>
        </div>
        <div class="card">
            <div class="stat-label">Errors Detected</div>
            <div id="error-count" class="stat-val" style="color: var(--accent-crimson)">0</div>
        </div>
        <div class="card">
            <div class="stat-label">Successful Remediations</div>
            <div id="success-count" class="stat-val" style="color: #22c55e">0</div>
        </div>
        <div class="card">
            <div class="stat-label">Failed Actions</div>
            <div id="fail-count" class="stat-val">0</div>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <h2 style="margin-top: 0">Live Incident Feed</h2>
            <div id="event-feed" class="event-feed">
                <!-- Events will stream here -->
            </div>
        </div>
        <div class="card">
            <h2 style="margin-top: 0">Rule Distribution</h2>
            <div class="chart-container">
                <canvas id="distributionChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chart = null;

        async function updateDashboard() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                // Update Stats
                document.getElementById('processed-count').innerText = data.stats.logs_processed;
                document.getElementById('error-count').innerText = data.stats.errors_detected;
                document.getElementById('success-count').innerText = data.stats.remediations_success;
                document.getElementById('fail-count').innerText = data.stats.remediations_failed;

                // Update Feed
                const feed = document.getElementById('event-feed');
                feed.innerHTML = '';
                data.events.reverse().forEach(event => {
                    const div = document.createElement('div');
                    div.className = `event-item ${event.severity}`;
                    div.innerHTML = `<strong>[${event.type}]</strong> ${event.message}`;
                    feed.appendChild(div);
                });

                // Update Chart
                updateChart(data.distribution);

            } catch (err) {
                console.error("Dashboard update failed", err);
            }
        }

        function updateChart(dist) {
            const ctx = document.getElementById('distributionChart').getContext('2d');
            const labels = Object.keys(dist);
            const values = Object.values(dist);

            if (chart) {
                chart.data.labels = labels;
                chart.data.datasets[0].data = values;
                chart.update();
            } else {
                chart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6', '#10b981'],
                            borderColor: '#1e293b',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } }
                    }
                });
            }
        }

        setInterval(updateDashboard, 1000);
        updateDashboard();
    </script>
</body>
</html>
